// ====== 渲染 ======
function render() {
    const groups = {};
    videos.forEach(v => {
        if (!groups[v.date]) groups[v.date] = [];
        groups[v.date].push(v);
    });

    const sortedDates = Object.keys(groups).sort().reverse();
    document.getElementById('totalDates').textContent = sortedDates.length;
    document.getElementById('totalVideos').textContent = videos.length;

    const container = document.getElementById('content');
    container.innerHTML = '';
    let globalIdx = 0;

    sortedDates.forEach(date => {
        const items = groups[date];
        const label = items[0].label;
        const section = document.createElement('div');
        section.className = 'date-group';

        const liveCount = items.filter(v => v.type === 'live').length;
        const reactCount = items.filter(v => v.type === 'react').length;
        let typeTags = '';
        if (liveCount > 0) typeTags += `<span class="tag orange">${liveCount} 录屏</span>`;
        if (reactCount > 0) typeTags += `<span class="tag">${reactCount} 反应</span>`;

        const heading = document.createElement('h2');
        heading.innerHTML = `<span class="date-badge">${label}</span> ${typeTags}`;
        section.appendChild(heading);

        items.forEach(v => {
            globalIdx++;
            const fullUrl = v.url.startsWith('http') ? v.url : `https://www.bilibili.com/video/${v.url}`;
            const card = document.createElement('div');
            card.className = 'video-card';
            const typeIcon = v.type === 'live' ? '🔴' : '🟡';
            const typeLabel = v.type === 'live' ? '直播录屏' : 'Reaction';

            card.innerHTML = `
                <div class="num">${globalIdx}</div>
                <div class="info">
                    <div class="title">${typeIcon} ${v.title}</div>
                    <div class="meta">${v.up || '未知'} · ${typeLabel}</div>
                </div>
                <a href="${fullUrl}" target="_blank" rel="noopener">▶ 观看</a>
            `;
            section.appendChild(card);
        });
        container.appendChild(section);
    });
}
